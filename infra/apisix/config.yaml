        expose_headers: "X-Request-ID"
        max_age: 3600
      jwt-auth:
        secret: "$JWT_SECRET_KEY"
        algorithm: "HS256"
        exp: 900
      limit-count:
        count: 1000
        time_window: 1
        rejected_code: 429
        key_type: "var"
        key: "remote_addr"
    proxy_buffering: false
    proxy_read_timeout: 300

