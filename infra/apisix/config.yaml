# DataPilot APISIX Gateway Configuration
# Routes: /api/v1/auth/* → 8004, /api/v1/sessions/* → 8006,
#         /api/v1/chat/* → 8000, /api/v1/semantic-models/* → 8001
# Plugins: JWT auth, rate-limit 1000 QPS, CORS

routes:
  # ============================================
  # Auth Service — /api/v1/auth/*
  # ============================================
  - uri: /api/v1/auth/*
    name: auth-service
    upstream:
      type: roundrobin
      nodes:
        "auth-service:8004": 1
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
        allow_headers: "Authorization,Content-Type,X-Request-ID"
        expose_headers: "X-Request-ID"
        max_age: 3600
      limit-count:
        count: 1000
        time_window: 1
        rejected_code: 429
        key_type: "var"
        key: "remote_addr"

  # ============================================
  # Session Service — /api/v1/sessions/*
  # ============================================
  - uri: /api/v1/sessions/*
    name: session-service
    upstream:
      type: roundrobin
      nodes:
        "session-service:8006": 1
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
        allow_headers: "Authorization,Content-Type,X-Request-ID"
        expose_headers: "X-Request-ID"
        max_age: 3600
      jwt-auth:
        secret: "$JWT_SECRET_KEY"
        algorithm: "HS256"
        exp: 900
      limit-count:
        count: 1000
        time_window: 1
        rejected_code: 429
        key_type: "var"
        key: "remote_addr"

  # ============================================
  # Agent Service (Chat) — /api/v1/chat/*
