apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datapilot-ingress
  namespace: datapilot
  annotations:
    kubernetes.io/ingress.class: apisix
    apisix.apache.org/enable-cors: "true"
    apisix.apache.org/cors-allow-origins: "*"
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8004
          - path: /api/v1/sessions
            pathType: Prefix
            backend:
              service:
                name: session-service
                port:
                  number: 8006
          - path: /api/v1/chat
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
          - path: /api/v1/dag
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
          - path: /api/v1/rca
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
          - path: /api/v1/tools
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
          - path: /api/v1/chart
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
          - path: /api/v1/dashboard
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
          - path: /api/v1/semantic-models
            pathType: Prefix
            backend:
              service:
                name: semantic-service
                port:
                  number: 8001
          - path: /api/v1/data-sources
            pathType: Prefix
            backend:
              service:
                name: semantic-service
                port:
                  number: 8001
          - path: /api/v1/metrics
            pathType: Prefix
            backend:
              service:
                name: semantic-service
                port:
                  number: 8001
          - path: /api/v1/dimensions
            pathType: Prefix
            backend:
              service:
                name: semantic-service
                port:
                  number: 8001
          - path: /api/v1/search
            pathType: Prefix
            backend:
              service:
                name: semantic-service
                port:
                  number: 8001
