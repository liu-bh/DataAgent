apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-service
  namespace: datapilot
  labels:
    app: guardrail-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardrail-service
  template:
    metadata:
      labels:
        app: guardrail-service
    spec:
      containers:
        - name: guardrail-service
          image: ghcr.io/liu-bh/dataagent/guardrail-service:latest
          ports:
            - containerPort: 8005
          env:
            - name: GUARDRAIL_PORT
              value: "8005"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: datapilot-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: guardrail-service
  namespace: datapilot
spec:
  selector:
    app: guardrail-service
  ports:
    - port: 8005
      targetPort: 8005
  type: ClusterIP
