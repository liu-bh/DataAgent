apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlgen-service
  namespace: datapilot
  labels:
    app: sqlgen-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlgen-service
  template:
    metadata:
      labels:
        app: sqlgen-service
    spec:
      containers:
        - name: sqlgen-service
          image: ghcr.io/liu-bh/dataagent/sql-generator-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: SQLGEN_PORT
              value: "8002"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: datapilot-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sqlgen-service
  namespace: datapilot
spec:
  selector:
    app: sqlgen-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
