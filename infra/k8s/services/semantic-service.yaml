apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-service
  namespace: datapilot
  labels:
    app: semantic-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-service
  template:
    metadata:
      labels:
        app: semantic-service
    spec:
      containers:
        - name: semantic-service
          image: ghcr.io/liu-bh/dataagent/semantic-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: SEMANTIC_PORT
              value: "8001"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: datapilot-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-service
  namespace: datapilot
spec:
  selector:
    app: semantic-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
