apiVersion: apps/v1
kind: Deployment
metadata:
  name: queryexec-service
  namespace: datapilot
  labels:
    app: queryexec-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queryexec-service
  template:
    metadata:
      labels:
        app: queryexec-service
    spec:
      containers:
        - name: queryexec-service
          image: ghcr.io/liu-bh/dataagent/query-executor-service:latest
          ports:
            - containerPort: 8003
          env:
            - name: QUERYEXEC_PORT
              value: "8003"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: datapilot-config
                  key: LOG_LEVEL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: queryexec-service
  namespace: datapilot
spec:
  selector:
    app: queryexec-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
