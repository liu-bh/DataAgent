name: CI Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ============================================
  # Job 1: Python 后端检查
  # ============================================
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-typecheck:
    name: Backend Type Check (mypy)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run mypy services/agent-service/src/
      - run: uv run mypy services/semantic-service/src/
      - run: uv run mypy services/sql-generator-service/src/

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datapilot
          POSTGRES_PASSWORD: datapilot
          POSTGRES_DB: datapilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datapilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Run unit tests
        env:
          AGENT_DATABASE_URL: postgresql+asyncpg://datapilot:datapilot@localhost:5432/datapilot_test
          AGENT_REDIS_URL: redis://localhost:6379/0
        run: |
          uv run pytest tests/unit/ -v \
            --cov=services \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml
      - name: Check coverage threshold
        run: |
          COVERAGE=$(uv run python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(float(r.attrib.get('line-rate', 0))*100)")
          echo "Coverage: ${COVERAGE}%"
          # 覆盖率低于 70% 阻断 (Phase1 初期可放宽)
          # if (( $(echo "$COVERAGE < 70" | bc -l) )); then echo "ERROR: Coverage ${COVERAGE}% < 70%"; exit 1; fi

  # ============================================
  # Job 2: 前端检查
  # ============================================
  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: cd web && pnpm install --frozen-lockfile
      - run: cd web && pnpm lint
      - run: cd web && pnpm format:check

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: cd web && pnpm install --frozen-lockfile
      - run: cd web && pnpm type-check

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: cd web && pnpm install --frozen-lockfile
      - run: cd web && pnpm build

  # ============================================
  # Job 3: 文档与规范检查
  # ============================================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all guide docs exist
        run: |
          REQUIRED_DOCS=(
            "docs/python-standards.md"
            "docs/typescript-standards.md"
            "docs/api-standards.md"
            "docs/database-standards.md"
            "docs/git-workflow.md"
            "docs/security-standards.md"
            "docs/guides/api-contract.md"
            "docs/guides/data-model.md"
          )
          missing=0
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "MISSING: $doc"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "ERROR: $missing required docs missing"
            exit 1
          fi
          echo "All required docs present"

  # ============================================
  # Job 4: 数据库迁移检查
  # ============================================
  migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datapilot
          POSTGRES_PASSWORD: datapilot
          POSTGRES_DB: datapilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datapilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Check migrations (semantic-service)
        env:
          SEMANTIC_DATABASE_URL: postgresql+asyncpg://datapilot:datapilot@localhost:5432/datapilot_test
        run: |
          cd services/semantic-service
          uv run alembic check 2>/dev/null || echo "No alembic yet (expected before Sprint 1)"

  # ============================================
  # Job 5: 安全检查
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Python dependency audit
        run: uv pip install pip-audit && uv run pip-audit -r services/agent-service/requirements.txt 2>/dev/null || echo "No requirements.txt yet"
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true  # Phase1 初期可放宽

  # ============================================
  # 汇总
  # ============================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-lint
      - backend-typecheck
      - backend-test
      - frontend-lint
      - frontend-typecheck
      - frontend-build
      - docs-check
      - security-scan
    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend Lint: ${{ needs.backend-lint.result }}"
          echo "Backend TypeCheck: ${{ needs.backend-typecheck.result }}"
          echo "Backend Test: ${{ needs.backend-test.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Frontend TypeCheck: ${{ needs.frontend-typecheck.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Docs Check: ${{ needs.docs-check.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          # 阻断性检查 (security-scan 初期不阻断)
          if [[ "${{ needs.backend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-test.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "CI FAILED"
            exit 1
          fi
          echo "CI PASSED"
