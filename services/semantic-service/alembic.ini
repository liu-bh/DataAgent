# Alembic 配置文件
# 用于数据库迁移管理

[alembic]
# 迁移脚本目录
script_location = alembic

# SQLAlchemy 连接串模板（实际值通过 env.py 从环境变量获取）
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost:5432/datapilot

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
